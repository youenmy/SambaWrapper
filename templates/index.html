{% extends "base.html" %}
{% block body %}
<div class="h-screen flex flex-col">

  <header class="flex items-center justify-between px-3 sm:px-4 h-12 bg-white border-b border-slate-200 shrink-0 gap-2">
    <div class="flex items-center gap-2 font-medium min-w-0">
      <button class="md:hidden text-slate-500 hover:text-slate-800" onclick="SW.toggleSidebar()" aria-label="Меню"><i class="ti ti-menu-2 text-xl"></i></button>
      <i class="ti ti-folder-open text-sky-600 text-xl"></i> <span class="truncate">SambaWrapper</span>
    </div>
    <div class="flex items-center gap-1">
      <label class="flex items-center gap-1.5 text-sm px-2.5 py-1.5 rounded-lg hover:bg-slate-100 cursor-pointer select-none">
        <input type="checkbox" id="theme-chk" onchange="SW.setTheme(this.checked)">
        <i class="ti ti-moon text-base"></i><span class="hidden sm:inline">Тёмная</span>
      </label>
      <div class="relative">
        <button id="userchip" class="flex items-center gap-2 text-sm px-2.5 py-1.5 rounded-lg hover:bg-slate-100"
                onclick="event.stopPropagation();SW.toggleUserMenu()">
          <span class="w-6 h-6 rounded-full bg-sky-100 text-sky-700 grid place-items-center text-xs">A</span>
          <span class="hidden sm:inline">admin</span> <i class="ti ti-chevron-down text-base"></i>
        </button>
        <div id="usermenu" class="hidden absolute right-0 top-10 w-52 bg-white border border-slate-200 rounded-lg shadow-lg p-1.5 z-50 text-sm">
          <button class="w-full text-left flex items-center gap-2 px-2.5 py-2 rounded-md hover:bg-slate-100"
                  onclick="SW.openModal('/htmx/users')"><i class="ti ti-users text-slate-500"></i>Пользователи Samba</button>
          <button class="w-full text-left flex items-center gap-2 px-2.5 py-2 rounded-md hover:bg-slate-100"
                  onclick="SW.openModal('/htmx/settings')"><i class="ti ti-settings text-slate-500"></i>Настройки</button>
          <form method="post" action="/logout">
            <button class="w-full text-left flex items-center gap-2 px-2.5 py-2 rounded-md hover:bg-slate-100"><i class="ti ti-logout text-slate-500"></i>Выйти</button>
          </form>
        </div>
      </div>
    </div>
  </header>

  <div class="flex flex-1 min-h-0 relative">
    <aside id="sidebar" class="w-64 shrink-0 bg-white border-r border-slate-200 overflow-y-auto
                                fixed md:static top-12 bottom-0 left-0 z-40 -translate-x-full md:translate-x-0 transition-transform duration-200"
           hx-get="/htmx/sidebar" hx-trigger="load, every 8s" hx-swap="innerHTML">
      <div class="p-4 text-slate-400 text-sm">Загрузка…</div>
    </aside>

    <main id="browser" class="flex-1 min-w-0 flex flex-col bg-white overflow-hidden">
      <div class="m-auto text-slate-400 text-sm flex flex-col items-center gap-2 px-4 text-center">
        <i class="ti ti-folder text-3xl"></i>
        <span class="md:hidden">Нажми <i class="ti ti-menu-2"></i> вверху, чтобы выбрать диск</span>
        <span class="hidden md:inline">Выбери диск слева</span>
      </div>
    </main>
    <div id="drop-overlay" style="display:none" class="absolute inset-0 md:left-64 z-20 bg-sky-500/10 border-2 border-dashed border-sky-400 flex items-center justify-center pointer-events-none">
      <span class="text-sky-600 text-lg flex items-center gap-2"><i class="ti ti-upload text-2xl"></i> Отпустите файлы для загрузки</span>
    </div>
  </div>
</div>

<div id="sb-backdrop" class="hidden fixed inset-0 bg-black/40 z-30 md:hidden" onclick="SW.closeSidebar()"></div>

<div id="modal-host" class="hidden fixed inset-0 z-[90] bg-black/40 flex items-center justify-center p-4"></div>
<div id="confirm-host" class="hidden fixed inset-0 z-[110] bg-black/40 flex items-center justify-center p-4"></div>
<div id="ctxmenu" class="hidden fixed z-[95] w-48 bg-white border border-slate-200 rounded-lg shadow-lg p-1 text-sm"></div>
<input type="file" id="uploader" multiple class="hidden" onchange="SW.doUpload(this)">
<div id="upload-tray" style="display:none" class="fixed bottom-4 right-4 z-[80] w-72 max-w-[90vw] bg-white border border-slate-200 rounded-xl shadow-lg overflow-hidden">
  <div class="flex items-center justify-between px-3 py-2 border-b border-slate-100 text-sm">
    <span id="ut-title" class="font-medium">Загрузка</span>
    <button onclick="document.getElementById('upload-tray').style.display='none'" class="text-slate-400 hover:text-slate-700" aria-label="Скрыть"><i class="ti ti-x"></i></button>
  </div>
  <div id="ut-list" class="max-h-48 overflow-y-auto p-2 space-y-2"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
const SW = {
  path: "",
  mountRoot: {{ mount_root | tojson }},
  curPort: {{ port | tojson }},
  sel: null,

  abs(rel) { return this.mountRoot + (rel ? "/" + rel : ""); },

  navigate(path) { htmx.ajax("GET", "/htmx/browse?path=" + encodeURIComponent(path), {target:"#browser", swap:"innerHTML"}); },
  refreshBrowser() { this.navigate(this.path); },
  refreshSidebar() { htmx.ajax("GET", "/htmx/sidebar", {target:"#sidebar", swap:"innerHTML"}); },
  _markActiveDisk() {
    const cur = (this.path || "").split("/")[0];
    document.querySelectorAll("#sidebar .disk-row").forEach(r => {
      r.classList.toggle("sw-active", !!cur && r.dataset.disk === cur);
    });
  },

  post(url, vals) { htmx.ajax("POST", url, {target:"#toast-host", swap:"beforeend", values:vals}); },

  openModal(url) {
    htmx.ajax("GET", url, {target:"#modal-host", swap:"innerHTML"}).then(() => {
      document.getElementById("modal-host").classList.remove("hidden");
    });
  },
  closeModal() {
    const m = document.getElementById("modal-host");
    m.classList.add("hidden"); m.innerHTML = "";
  },
  confirm(message, onYes, opts) {
    opts = opts || {};
    const host = document.getElementById("confirm-host");
    const safe = String(message).replace(/&/g, "&amp;").replace(/</g, "&lt;");
    host.innerHTML = `<div class="bg-white rounded-xl p-5 w-full max-w-sm shadow-xl" onclick="event.stopPropagation()">
      <p class="text-sm mb-4 whitespace-pre-line">${safe}</p>
      <div class="flex justify-end gap-2">
        <button id="cf-no" class="px-3 py-1.5 text-slate-500 rounded-lg hover:bg-slate-100">${opts.cancel || "Отмена"}</button>
        <button id="cf-yes" class="px-4 py-1.5 ${opts.danger ? "bg-red-600 hover:bg-red-500" : "bg-sky-600 hover:bg-sky-500"} text-white rounded-lg">${opts.ok || "ОК"}</button>
      </div>
    </div>`;
    host.classList.remove("hidden");
    const close = () => { host.classList.add("hidden"); host.innerHTML = ""; };
    host.onclick = close;
    document.getElementById("cf-no").onclick = close;
    document.getElementById("cf-yes").onclick = () => { close(); if (onYes) onYes(); };
  },
  prompt(message, def, onOk, opts) {
    opts = opts || {};
    const host = document.getElementById("confirm-host");
    const safe = String(message).replace(/&/g, "&amp;").replace(/</g, "&lt;");
    const dv = String(def == null ? "" : def).replace(/&/g, "&amp;").replace(/"/g, "&quot;");
    host.innerHTML = `<div class="bg-white rounded-xl p-5 w-full max-w-sm shadow-xl" onclick="event.stopPropagation()">
      <p class="text-sm mb-3 whitespace-pre-line">${safe}</p>
      <input id="cf-input" autocomplete="off" class="w-full border border-slate-300 rounded-lg px-3 py-2 mb-4" value="${dv}">
      <div class="flex justify-end gap-2">
        <button id="cf-no" class="px-3 py-1.5 text-slate-500 rounded-lg hover:bg-slate-100">${opts.cancel || "Отмена"}</button>
        <button id="cf-yes" class="px-4 py-1.5 bg-sky-600 hover:bg-sky-500 text-white rounded-lg">${opts.ok || "ОК"}</button>
      </div>
    </div>`;
    host.classList.remove("hidden");
    const inp = document.getElementById("cf-input");
    const close = () => { host.classList.add("hidden"); host.innerHTML = ""; };
    const submit = () => { const v = inp.value; close(); if (onOk) onOk(v); };
    host.onclick = close;
    document.getElementById("cf-no").onclick = close;
    document.getElementById("cf-yes").onclick = submit;
    inp.addEventListener("keydown", (e) => { if (e.key === "Enter") { e.preventDefault(); submit(); } else if (e.key === "Escape") close(); });
    setTimeout(() => { inp.focus(); inp.select(); }, 30);
  },

  toggleUserMenu() { document.getElementById("usermenu").classList.toggle("hidden"); },

  setTheme(on) {
    document.documentElement.classList.toggle("dark", on);
    localStorage.setItem("sw.theme", on ? "dark" : "light");
  },
  _syncTheme() {
    const c = document.getElementById("theme-chk");
    if (c) c.checked = document.documentElement.classList.contains("dark");
  },
  toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("-translate-x-full");
    document.getElementById("sb-backdrop").classList.toggle("hidden");
  },
  closeSidebar() {
    if (window.innerWidth < 768) {
      document.getElementById("sidebar").classList.add("-translate-x-full");
      document.getElementById("sb-backdrop").classList.add("hidden");
    }
  },

  checked: new Set(),
  select(path, name, isDir) { this.sel = {path, name, isDir}; this._mark(); },
  toggleCheck(path, on) { if (on) this.checked.add(path); else this.checked.delete(path); this._mark(); this._bar(); },
  checkAll(on) {
    this.checked.clear();
    document.querySelectorAll("#browser .fchk").forEach(c => {
      c.checked = on; if (on) this.checked.add(c.closest(".frow").dataset.path);
    });
    this._mark(); this._bar();
  },
  resetSel() { this.sel = null; this.checked.clear(); },
  _mark() {
    document.querySelectorAll("#browser .frow").forEach(r => {
      const on = this.checked.has(r.dataset.path) || (this.sel && r.dataset.path === this.sel.path);
      r.classList.toggle("bg-sky-50", on);
    });
  },
  _bar() {
    const el = document.getElementById("selinfo");
    if (el) el.textContent = this.checked.size ? ("выбрано: " + this.checked.size) : (el.dataset.count + " элементов");
  },
  _targets() {  // current operation targets: checked set, else single selection
    if (this.checked.size) return [...this.checked];
    return this.sel ? [this.sel.path] : [];
  },

  mkdir() { this.prompt("Имя новой папки", "", (n) => { if (n && n.trim()) this.post("/htmx/mkdir", {path:this.path, name:n.trim()}); }); },
  rename() {
    if (this.checked.size > 1) { this.toast("Переименование — по одному элементу"); return; }
    const t = this.checked.size === 1 ? {path:[...this.checked][0], name:[...this.checked][0].split("/").pop()} : this.sel;
    if (!t) { this.toast("Выбери элемент"); return; }
    this.prompt("Новое имя", t.name, (n) => { if (n && n.trim() && n.trim() !== t.name) this.post("/htmx/rename", {path:t.path, new_name:n.trim()}); });
  },
  del() {
    const paths = this._targets();
    if (!paths.length) { this.toast("Выбери элементы"); return; }
    this.confirm("Удалить выбранное (" + paths.length + ")? Папки удалятся со всем содержимым.", () => {
      if (paths.length === 1) this.post("/htmx/delete", {path:paths[0]});
      else this._postMany("/htmx/delete-many", "paths", paths);
    }, {ok: "Удалить", danger: true});
  },
  move() {
    const srcs = this._targets();
    if (!srcs.length) { this.toast("Выбери элементы"); return; }
    htmx.ajax("GET", "/htmx/move-form", {target:"#modal-host", swap:"innerHTML"}).then(() => {
      const box = document.getElementById("move-srcs");
      const a = s => String(s).replace(/"/g, "&quot;");
      box.innerHTML = srcs.map(s => `<input type="hidden" name="srcs" value="${a(s)}">`).join("");
      document.getElementById("modal-host").classList.remove("hidden");
    });
  },
  _postMany(url, field, values) {
    const body = new URLSearchParams();
    values.forEach(v => body.append(field, v));
    fetch(url, {method:"POST", body}).then(r => r.text()).then(html => { this._toastHtml(html); this.refreshBrowser(); });
  },
  dragStart(e, rel) {
    this._drag = (this.checked.size && this.checked.has(rel)) ? [...this.checked] : [rel];
    e.dataTransfer.effectAllowed = "move";
    e.dataTransfer.setData("text/plain", rel);
  },
  dragOver(e, el) { e.preventDefault(); el.classList.add("ring-2", "ring-sky-400"); },
  drop(e, destRel, el) {
    e.preventDefault(); e.stopPropagation();
    if (el) el.classList.remove("ring-2", "ring-sky-400");
    const ov = document.getElementById("drop-overlay"); if (ov) ov.style.display = "none";
    if (e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files.length) {
      const entries = this.dropEntries(e);
      if (entries.length) this.uploadEntries(entries, destRel);
      else this.uploadFiles(e.dataTransfer.files, destRel);
      this._drag = null;
      return;
    }
    const srcs = (this._drag || []).filter(s => s !== destRel);
    this._drag = null;
    if (!srcs.length) return;
    const body = new URLSearchParams();
    srcs.forEach(s => body.append("srcs", s));
    body.append("dest_dir", destRel);
    fetch("/htmx/move-many", {method:"POST", body}).then(r => r.text()).then(html => { this._toastHtml(html); this.refreshBrowser(); });
  },

  share(rel, name) { this.openModal("/htmx/share-form?path=" + encodeURIComponent(this.abs(rel)) + "&suggested_name=" + encodeURIComponent(name)); },
  shareCurrent() { if (!this.path) { this.toast("Открой папку внутри диска"); return; }
                   this.share(this.path, this.path.split("/").pop()); },
  download(rel) { window.location = "/download?path=" + encodeURIComponent(rel); },
  _mediaKind(name) {
    const ext = (String(name).split(".").pop() || "").toLowerCase();
    if (["mp4","webm","ogv","m4v","mov","mkv","avi","mpg","mpeg","ts","wmv","flv"].includes(ext)) return "video";
    if (["mp3","m4a","aac","ogg","oga","opus","flac","wav","wma"].includes(ext)) return "audio";
    if (["jpg","jpeg","png","gif","webp","bmp","svg","avif"].includes(ext)) return "image";
    return "";
  },
  // двойной клик по медиа — проигрывание в браузере; остальное — скачивание
  openFile(rel, name) {
    const kind = this._mediaKind(name);
    if (kind) this.playMedia(rel, name, kind);
    else this.download(rel);
  },
  playMedia(rel, name, kind) {
    if (kind === "video") return this._playVideo(rel, name);
    const url = "/stream?path=" + encodeURIComponent(rel);
    const dl = "/download?path=" + encodeURIComponent(rel);
    const errMsg = `<div class="text-sm text-slate-300 text-center py-8 px-4">Браузер не смог воспроизвести этот файл.<br><a href="${dl}" class="text-sky-400 underline">Скачать файл</a></div>`;
    const media = kind === "audio"
      ? `<audio src="${url}" controls autoplay class="w-full" onerror="this.outerHTML='${errMsg.replace(/'/g, "\\'")}'"></audio>`
      : `<img src="${url}" class="max-h-[72vh] max-w-full rounded-lg object-contain">`;
    this._mediaModal(name, dl, `<div class="flex items-center justify-center min-h-[8rem]">${media}</div>`);
  },
  _playVideo(rel, name) {
    if (!document.getElementById("sw-fs-style")) {
      const st = document.createElement("style"); st.id = "sw-fs-style";
      st.textContent = "#sw-player:fullscreen{max-width:none;width:100%;height:100%;border-radius:0;justify-content:center}" +
                       "#sw-player:fullscreen .sw-hdr{display:none}" +
                       "#sw-player:fullscreen .sw-video{max-height:88vh}";
      document.head.appendChild(st);
    }
    const dl = "/download?path=" + encodeURIComponent(rel);
    const m = document.getElementById("modal-host");
    m.innerHTML = `<div id="sw-player" class="bg-slate-900 text-slate-200 rounded-xl p-3 w-full max-w-4xl flex flex-col gap-2" onclick="event.stopPropagation()">
      <div class="sw-hdr flex items-center gap-2">
        <i class="ti ti-player-play text-sky-400"></i>
        <span class="font-medium text-sm truncate flex-1">${this._escHtml(name)}</span>
        <a href="${dl}" class="text-slate-400 hover:text-sky-400" title="Скачать"><i class="ti ti-download text-lg"></i></a>
        <button class="text-slate-400 hover:text-white" onclick="SW.closeModal()"><i class="ti ti-x text-lg"></i></button>
      </div>
      <video id="sw-vid" autoplay playsinline class="sw-video max-h-[64vh] max-w-full w-full rounded-lg bg-black"
             onclick="SW.plToggle()" onerror="document.getElementById('sw-pl-err').classList.remove('hidden')"></video>
      <div id="sw-pl-err" class="hidden text-sm text-slate-300 text-center py-2">Не удалось воспроизвести (возможно, видео в H.265/экзотическом кодеке). <a href="${dl}" class="text-sky-400 underline">Скачать</a></div>
      <div class="flex items-center gap-2 text-xs text-slate-400 select-none px-0.5">
        <span id="sw-cur" class="tabular-nums w-12 text-right">0:00</span>
        <div id="sw-seek" class="flex-1 h-2 bg-slate-700 rounded cursor-pointer relative" onclick="SW.seekTo(event)" title="Клик — перемотка">
          <div id="sw-fill" class="h-full bg-sky-500 rounded" style="width:0%"></div>
        </div>
        <span id="sw-dur" class="tabular-nums w-12">--:--</span>
      </div>
      <div class="flex items-center gap-3 text-slate-300 px-0.5 pb-0.5">
        <button onclick="SW.plToggle()" class="hover:text-white" title="Воспроизведение/пауза"><i id="sw-pl-icon" class="ti ti-player-pause-filled text-xl"></i></button>
        <button onclick="SW.plMute()" class="hover:text-white" title="Звук"><i id="sw-vol-icon" class="ti ti-volume text-lg"></i></button>
        <input id="sw-vol" type="range" min="0" max="1" step="0.05" value="1" oninput="SW.plVolume(this.value)" class="w-24 accent-sky-500 cursor-pointer">
        <button onclick="SW.plFullscreen()" class="hover:text-white ml-auto" title="Полный экран"><i class="ti ti-maximize text-lg"></i></button>
      </div>
    </div>`;
    m.classList.remove("hidden");
    this._pl = {rel: rel, duration: 0, offset: 0};
    const v = document.getElementById("sw-vid");
    v.src = "/transcode?path=" + encodeURIComponent(rel) + "&ss=0";
    v.addEventListener("timeupdate", () => this._plTick());
    v.addEventListener("play", () => { const i = document.getElementById("sw-pl-icon"); if (i) i.className = "ti ti-player-pause-filled text-xl"; });
    v.addEventListener("pause", () => { const i = document.getElementById("sw-pl-icon"); if (i) i.className = "ti ti-player-play-filled text-xl"; });
    fetch("/media-info?path=" + encodeURIComponent(rel)).then((r) => r.json()).then((d) => {
      this._pl.duration = d.duration || 0;
      const el = document.getElementById("sw-dur"); if (el) el.textContent = this._fmtT(this._pl.duration);
    }).catch(() => {});
  },
  _mediaModal(name, dl, inner) {
    const m = document.getElementById("modal-host");
    m.innerHTML = `<div class="bg-white rounded-xl p-4 w-full max-w-4xl flex flex-col gap-3" onclick="event.stopPropagation()">
      <div class="flex items-center gap-2">
        <i class="ti ti-player-play text-sky-600"></i>
        <span class="font-medium text-sm truncate flex-1">${this._escHtml(name)}</span>
        <a href="${dl}" class="text-slate-400 hover:text-sky-600" title="Скачать"><i class="ti ti-download text-lg"></i></a>
        <button class="text-slate-400 hover:text-slate-700" onclick="SW.closeModal()"><i class="ti ti-x text-lg"></i></button>
      </div>${inner}
    </div>`;
    m.classList.remove("hidden");
  },
  plToggle() { const v = document.getElementById("sw-vid"); if (!v) return; if (v.paused) v.play().catch(() => {}); else v.pause(); },
  plVolume(val) {
    const v = document.getElementById("sw-vid"); if (!v) return;
    v.volume = parseFloat(val); v.muted = v.volume <= 0; this._volIcon();
  },
  plMute() {
    const v = document.getElementById("sw-vid"), sl = document.getElementById("sw-vol"); if (!v) return;
    v.muted = !v.muted;
    if (!v.muted && v.volume === 0) { v.volume = 0.5; }
    if (sl) sl.value = v.muted ? 0 : v.volume;
    this._volIcon();
  },
  _volIcon() {
    const v = document.getElementById("sw-vid"), i = document.getElementById("sw-vol-icon"); if (!v || !i) return;
    i.className = (v.muted || v.volume === 0) ? "ti ti-volume-off text-lg" : (v.volume < 0.5 ? "ti ti-volume-2 text-lg" : "ti ti-volume text-lg");
  },
  plFullscreen() {
    const p = document.getElementById("sw-player"); if (!p) return;
    if (document.fullscreenElement) { document.exitFullscreen(); return; }
    (p.requestFullscreen || p.webkitRequestFullscreen || p.msRequestFullscreen || function () {}).call(p);
  },
  _plTick() {
    const pl = this._pl, v = document.getElementById("sw-vid");
    if (!pl || !v) return;
    const real = pl.offset + (v.currentTime || 0);
    const fill = document.getElementById("sw-fill");
    if (fill && pl.duration) fill.style.width = Math.min(100, real / pl.duration * 100) + "%";
    const cur = document.getElementById("sw-cur"); if (cur) cur.textContent = this._fmtT(real);
  },
  seekTo(e) {
    const pl = this._pl; if (!pl || !pl.duration) return;
    const bar = document.getElementById("sw-seek"), v = document.getElementById("sw-vid");
    const rect = bar.getBoundingClientRect();
    let frac = (e.clientX - rect.left) / rect.width; frac = Math.max(0, Math.min(0.999, frac));
    const t = frac * pl.duration; pl.offset = t;
    v.src = "/transcode?path=" + encodeURIComponent(pl.rel) + "&ss=" + Math.floor(t);
    v.load(); v.play().catch(() => {});
    this._plTick();
  },
  _fmtT(s) {
    s = Math.max(0, Math.floor(s || 0));
    const h = Math.floor(s / 3600), m = Math.floor(s % 3600 / 60), x = s % 60;
    return (h ? h + ":" + String(m).padStart(2, "0") : m) + ":" + String(x).padStart(2, "0");
  },

  openTorrents() {
    this.path = "";
    htmx.ajax("GET", "/htmx/torrents-page", {target: "#browser", swap: "innerHTML"}).then(() => this._markActiveDisk());
    this.closeSidebar();
  },
  pasteMagnet() {
    const inp = document.getElementById("tr-magnet");
    if (!inp) return;
    if (!navigator.clipboard || !navigator.clipboard.readText) {
      this.toast("Буфер недоступен — вставь вручную (Ctrl+V)"); inp.focus(); return;
    }
    navigator.clipboard.readText()
      .then((t) => { inp.value = (t || "").trim(); inp.focus(); })
      .catch(() => { this.toast("Нет доступа к буферу обмена"); inp.focus(); });
  },
  initTrDest() {
    const dirs = window.SW_TR_DIRS || [];
    if (!dirs.length) return;
    const def = localStorage.getItem("sw.trDirDefault");
    const chosen = dirs.find((d) => d.abs === def) || dirs[0];
    this.setTrDest(chosen.abs, chosen.label, false);
  },
  setTrDest(abs, label, saveDefault) {
    this.trDir = abs;
    const inp = document.getElementById("tr-dir"); if (inp) inp.value = abs;
    const lbl = document.getElementById("tr-dest-label");
    if (lbl) { lbl.textContent = label; lbl.classList.remove("text-slate-500"); lbl.classList.add("text-slate-800"); }
    if (saveDefault) localStorage.setItem("sw.trDirDefault", abs);
  },
  openTorrentDest() { this.openModal("/htmx/torrent-dest"); },
  chooseTrDest(abs, label) {
    const cb = document.getElementById("tr-dest-default");
    const remember = !!(cb && cb.checked);
    this.setTrDest(abs, label, remember);
    if (!remember) localStorage.removeItem("sw.trDirDefault");
    this.closeModal();
  },
  torrentAdd() {
    const spec = (document.getElementById("tr-magnet") || {}).value || "";
    const dir = (document.getElementById("tr-dir") || {}).value || "";
    if (!spec.trim()) { this.toast("Вставь magnet-ссылку или URL"); return; }
    this.post("/htmx/torrent-add", {spec: spec.trim(), download_dir: dir});
    document.getElementById("tr-magnet").value = "";
  },
  torrentUpload(input) {
    const f = input.files && input.files[0];
    const dir = (document.getElementById("tr-dir") || {}).value || "";
    input.value = "";
    if (!f) return;
    const body = new FormData(); body.append("download_dir", dir); body.append("file", f);
    fetch("/htmx/torrent-upload", {method: "POST", body})
      .then((r) => r.text())
      .then((html) => { document.getElementById("toast-host").insertAdjacentHTML("beforeend", html); })
      .catch(() => this.toast("Не удалось загрузить .torrent"));
  },
  torrentRemove(id, name, withData) {
    this.confirm(
      withData ? `Удалить торрент «${name}» вместе со скачанными файлами?` : `Убрать торрент «${name}» из списка? Файлы останутся на диске.`,
      () => this.post("/htmx/torrent-action", {id, action: withData ? "remove-data" : "remove"}),
      {ok: "Удалить", danger: !!withData});
  },

  upload() { document.getElementById("uploader").click(); },
  doUpload(input) { this.uploadFiles(input.files, this.path); input.value = ""; },
  uploadFiles(files, dir) {
    dir = (dir == null ? this.path : dir);
    if (!dir) { this.toast("Сначала открой диск или папку для загрузки"); return; }
    this._runUploads(Array.from(files || []).map((f) => ({file: f, dir: dir, label: f.name})));
  },
  dropEntries(e) {  // вытащить записи (для папок) синхронно, до любого await
    const items = e.dataTransfer && e.dataTransfer.items, out = [];
    if (items && items.length && items[0].webkitGetAsEntry) {
      for (let i = 0; i < items.length; i++) { const en = items[i].webkitGetAsEntry(); if (en) out.push(en); }
    }
    return out;
  },
  uploadEntries(entries, base) {
    base = (base == null ? this.path : base);
    if (!base) { this.toast("Сначала открой диск или папку для загрузки"); return; }
    const dirs = new Set();
    const readAll = (rd) => new Promise((res) => { const a = []; const pump = () => rd.readEntries((b) => { if (!b.length) return res(a); a.push.apply(a, b); pump(); }, () => res(a)); pump(); });
    const walk = async (entry, prefix) => {
      if (entry.isFile) { const f = await new Promise((r) => entry.file(r, () => r(null))); return f ? [{file: f, rel: prefix + f.name}] : []; }
      if (entry.isDirectory) { dirs.add(prefix + entry.name); const es = await readAll(entry.createReader()); let out = []; for (const e of es) out = out.concat(await walk(e, prefix + entry.name + "/")); return out; }
      return [];
    };
    (async () => {
      let coll = [];
      for (const en of entries) coll = coll.concat(await walk(en, ""));
      if (dirs.size) {  // создаём все папки, включая пустые, до загрузки файлов
        const body = new URLSearchParams();
        dirs.forEach((d) => body.append("dirs", base + "/" + d));
        try { await fetch("/htmx/mkdirs", {method: "POST", body}); } catch (e) {}
      }
      if (!coll.length) { this.refreshBrowser(); if (dirs.size) this.toast("Папки созданы"); return; }
      this._runUploads(coll.map(({file, rel}) => {
        const parts = rel.split("/"); parts.pop(); const sub = parts.join("/");
        return {file, dir: sub ? base + "/" + sub : base, label: rel};
      }));
    })();
  },
  _runUploads(list) {
    if (!list.length) return;
    const tray = document.getElementById("upload-tray");
    const listEl = document.getElementById("ut-list");
    tray.style.display = "block";
    this._activeUploads = (this._activeUploads || 0) + 1;
    const rows = list.map((it) => {
      const row = document.createElement("div");
      row.innerHTML = `<div class="text-xs truncate mb-1">${this._escHtml(it.label || it.file.name)}</div>
        <div class="h-1.5 bg-slate-200 rounded overflow-hidden"><div class="ut-bar h-full bg-sky-500 transition-all" style="width:0%"></div></div>`;
      listEl.appendChild(row); return row;
    });
    const up = (i) => {
      if (i >= list.length) {
        this.refreshBrowser();
        this._activeUploads--;
        if (this._activeUploads <= 0) {
          document.getElementById("ut-title").textContent = "Загрузка завершена";
          setTimeout(() => { if (this._activeUploads <= 0) { tray.style.display = "none"; listEl.innerHTML = ""; } }, 3000);
        }
        return;
      }
      const it = list[i], bar = rows[i].querySelector(".ut-bar");
      const fd = new FormData(); fd.append("dir", it.dir); fd.append("file", it.file);
      const xhr = new XMLHttpRequest();
      xhr.open("POST", "/htmx/upload");
      xhr.upload.onprogress = (e) => { if (e.lengthComputable) bar.style.width = Math.round(e.loaded / e.total * 100) + "%"; };
      xhr.onload = () => { bar.style.width = "100%"; bar.classList.remove("bg-sky-500"); bar.classList.add("bg-emerald-500"); up(i + 1); };
      xhr.onerror = () => { bar.classList.remove("bg-sky-500"); bar.classList.add("bg-red-500"); up(i + 1); };
      document.getElementById("ut-title").textContent = "Загрузка " + (i + 1) + "/" + list.length;
      xhr.send(fd);
    };
    up(0);
  },

  mountModal(path, fstype, uuid, label, suggested, autoMount) {
    const a = s => String(s).replace(/"/g, "&quot;");
    const html = `<div class="bg-white rounded-xl p-5 w-full max-w-sm" onclick="event.stopPropagation()">
      <h3 class="font-medium mb-3">Смонтировать диск</h3>
      <form hx-post="/htmx/mount" hx-target="#toast-host" hx-swap="beforeend" class="space-y-3">
        <input type="hidden" name="path" value="${a(path)}">
        <input type="hidden" name="fstype" value="${a(fstype)}">
        <input type="hidden" name="uuid" value="${a(uuid)}">
        <input type="hidden" name="label" value="${a(label)}">
        <label class="block text-sm">Имя в системе
          <input name="mount_name" required pattern="[A-Za-z0-9_.\\-]{1,32}" value="${a(suggested)}"
                 class="mt-1 w-full border border-slate-300 rounded-lg px-3 py-2"></label>
        <label class="flex items-center gap-2 text-sm"><input type="checkbox" name="auto_mount" value="yes" ${autoMount ? "checked" : ""}>монтировать автоматически впредь</label>
        <div class="flex justify-end gap-2">
          <button type="button" class="px-3 py-1.5 text-slate-500" onclick="SW.closeModal()">Отмена</button>
          <button class="px-4 py-1.5 bg-sky-600 text-white rounded-lg">Смонтировать</button>
        </div>
      </form></div>`;
    const m = document.getElementById("modal-host"); m.innerHTML = html; m.classList.remove("hidden"); htmx.process(m);
  },

  formatModal(device, kname, label) {
    const a = s => String(s).replace(/"/g, "&quot;");
    const kj = String(kname).replace(/\\/g, "\\\\").replace(/'/g, "\\'");
    const html = `<div class="bg-white rounded-xl p-5 w-full max-w-md" onclick="event.stopPropagation()">
      <h3 class="font-medium mb-1 text-red-600 flex items-center gap-2"><i class="ti ti-alert-triangle"></i>Форматировать ${a(kname)}</h3>
      <p class="text-sm text-slate-500 mb-3">Все данные на <code>${a(device)}</code> будут стёрты безвозвратно.</p>
      <form hx-post="/htmx/format" hx-target="#toast-host" hx-swap="beforeend" class="space-y-3">
        <input type="hidden" name="device" value="${a(device)}">
        <label class="block text-sm text-slate-600">Файловая система
          <select name="fstype" class="mt-1 w-full border border-slate-300 rounded-lg px-3 py-2">
            <option value="ext4">ext4 — Linux, быстрее всего</option>
            <option value="exfat">exFAT — читается везде (Windows/Mac)</option>
            <option value="ntfs">NTFS — Windows</option>
          </select></label>
        <label class="block text-sm text-slate-600">Метка (необязательно)
          <input name="label" maxlength="11" value="${a(label)}" class="mt-1 w-full border border-slate-300 rounded-lg px-3 py-2"></label>
        <label class="block text-sm text-slate-600">Для подтверждения введите <code>${a(kname)}</code>
          <input name="confirm" autocomplete="off" oninput="document.getElementById('fmt-go').disabled = this.value.trim() !== '${kj}'"
                 class="mt-1 w-full border border-slate-300 rounded-lg px-3 py-2"></label>
        <div class="flex justify-end gap-2">
          <button type="button" class="px-3 py-1.5 text-slate-500" onclick="SW.closeModal()">Отмена</button>
          <button id="fmt-go" disabled class="px-4 py-1.5 bg-red-600 text-white rounded-lg disabled:opacity-40 disabled:cursor-not-allowed">Форматировать</button>
        </div>
      </form></div>`;
    const m = document.getElementById("modal-host"); m.innerHTML = html; m.classList.remove("hidden"); htmx.process(m);
  },

  portModal() {
    const html = `<div class="bg-white rounded-xl p-5 w-full max-w-sm" onclick="event.stopPropagation()">
      <h3 class="font-medium mb-1">Порт веб-интерфейса</h3>
      <p class="text-sm text-slate-500 mb-3">Текущий порт: ${this.curPort}. После смены страница станет недоступна — переподключись на новый порт.</p>
      <form hx-post="/htmx/set-port" hx-target="#toast-host" hx-swap="beforeend" class="space-y-3">
        <input type="number" name="port" min="1024" max="65535" required value="${this.curPort}"
               class="w-full border border-slate-300 rounded-lg px-3 py-2">
        <div class="flex justify-end gap-2">
          <button type="button" class="px-3 py-1.5 text-slate-500" onclick="SW.closeModal()">Отмена</button>
          <button class="px-4 py-1.5 bg-sky-600 text-white rounded-lg">Сменить и перезапустить</button>
        </div>
      </form></div>`;
    const m = document.getElementById("modal-host"); m.innerHTML = html; m.classList.remove("hidden"); htmx.process(m);
  },

  fixDisk(device, kname) {
    this.confirm("Проверить и попытаться исправить ошибки файловой системы на " + kname + "?\nДиск будет отмонтирован на время проверки. Данные не удаляются.", () => {
      this.toast("Проверка " + kname + "… это может занять время");
      this.post("/htmx/disk-check", {device});
    }, {ok: "Проверить"});
  },
  disconnectDisk(mountPoint, label) {
    this.confirm("Отключить диск «" + label + "»?\nДанные будут сброшены на диск, после чего его можно безопасно извлечь.",
      () => this._umount(mountPoint, false), {ok: "Отключить"});
  },
  _umount(mountPoint, force) {
    const body = new URLSearchParams({mount_point: mountPoint});
    if (force) body.append("force", "yes");
    fetch("/htmx/umount", {method: "POST", body}).then(r => r.text()).then(html => {
      this._toastHtml(html);
      if (!force && /занят/.test(html)) {
        this.confirm("Диск занят (открыт по сети). Отключить принудительно? Убедись, что на других устройствах он закрыт.",
          () => this._umount(mountPoint, true), {ok: "Принудительно", danger: true});
      } else {
        this.refreshSidebar();
        if (/отключ|извлек/i.test(html)) this.navigate("");
      }
    }).catch(() => this.toast("Ошибка отключения"));
  },

  passwordModal() {
    const html = `<div class="bg-white rounded-xl p-5 w-full max-w-sm" onclick="event.stopPropagation()">
      <h3 class="font-medium mb-3">Сменить пароль админки</h3>
      <form hx-post="/htmx/admin-passwd" hx-target="#toast-host" hx-swap="beforeend" class="space-y-3">
        <input type="password" name="password" required minlength="8" placeholder="Новый пароль (≥8)"
               class="w-full border border-slate-300 rounded-lg px-3 py-2">
        <div class="flex justify-end gap-2">
          <button type="button" class="px-3 py-1.5 text-slate-500" onclick="SW.closeModal()">Отмена</button>
          <button class="px-4 py-1.5 bg-sky-600 text-white rounded-lg">Сохранить</button>
        </div>
      </form></div>`;
    const m = document.getElementById("modal-host"); m.innerHTML = html; m.classList.remove("hidden"); htmx.process(m);
  },

  ctx(evt, rel, name, isDir) {
    evt.preventDefault(); this.select(rel, name, isDir);
    const items = [];
    if (isDir) items.push(["ti-folder-open","Открыть",() => SW.navigate(rel)]);
    else {
      if (this._mediaKind(name)) items.push(["ti-player-play","Воспроизвести",() => SW.openFile(rel, name)]);
      items.push(["ti-download","Скачать",() => SW.download(rel)]);
    }
    items.push(["ti-edit","Переименовать",() => SW.rename()]);
    items.push(["ti-arrows-move","Переместить",() => SW.move()]);
    if (isDir) items.push(["ti-share","Расшарить",() => SW.share(rel, name)]);
    items.push(["ti-trash","Удалить",() => SW.del(),"text-red-600"]);
    const menu = document.getElementById("ctxmenu");
    // строим кнопки через DOM, а не innerHTML: имя файла (в т.ч. из чужого
    // торрента) не должно попадать в HTML-атрибут как текст
    menu.innerHTML = "";
    items.forEach(([ic, label, act, cls]) => {
      const b = document.createElement("button");
      b.className = `w-full text-left flex items-center gap-2 px-2.5 py-1.5 rounded-md hover:bg-slate-100 ${cls || ""}`;
      b.innerHTML = `<i class="ti ${ic} text-slate-500"></i>${label}`;  // ic/label — свои константы
      b.onclick = () => { menu.classList.add("hidden"); act(); };
      menu.appendChild(b);
    });
    menu.style.left = Math.min(evt.clientX, window.innerWidth-200) + "px";
    menu.style.top = Math.min(evt.clientY, window.innerHeight-260) + "px";
    menu.classList.remove("hidden");
  },

  copyShare(name) {
    const path = "\\\\" + location.hostname + "\\" + name;
    const done = () => this.toast("Скопировано: " + path);
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(path).then(done).catch(() => this._copyFallback(path, done));
    } else { this._copyFallback(path, done); }
  },
  _copyFallback(text, done) {
    const ta = document.createElement("textarea");
    ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.focus(); ta.select();
    try { document.execCommand("copy"); done(); } catch (e) { this.toast(text); }
    ta.remove();
  },
  toast(msg) { this._toastHtml(`<div class="toast-msg rounded-lg px-4 py-3 text-sm shadow-lg bg-slate-800 text-white">${this._escHtml(msg)}</div>`); },
  _toastHtml(html) {
    const host = document.getElementById("toast-host");
    const tmp = document.createElement("div"); tmp.innerHTML = html;
    const node = tmp.firstElementChild; if (!node) return;
    host.appendChild(node); setTimeout(() => node.remove(), 4000);
  },
  _escHtml(s) { return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); },
};
window.SW = SW;
SW._syncTheme();

document.body.addEventListener("refreshBrowser", () => SW.refreshBrowser());
document.body.addEventListener("refreshSidebar", () => SW.refreshSidebar());
document.body.addEventListener("closeModal", () => SW.closeModal());
document.body.addEventListener("reloadUsers", () => SW.openModal("/htmx/users"));
document.body.addEventListener("reloadTorrents", () => SW.openTorrents());
document.body.addEventListener("htmx:afterSwap", (e) => {
  if (e.target && (e.target.id === "sidebar" || e.target.id === "browser")) SW._markActiveDisk();
});

document.addEventListener("click", (e) => {
  document.getElementById("ctxmenu").classList.add("hidden");
  if (!e.target.closest("#userchip")) document.getElementById("usermenu").classList.add("hidden");
});
document.getElementById("modal-host").addEventListener("click", () => SW.closeModal());

// drag&drop загрузка файлов с компьютера в текущую папку
(function() {
  const br = document.getElementById("browser");
  const ov = document.getElementById("drop-overlay");
  const hasFiles = (e) => e.dataTransfer && Array.from(e.dataTransfer.types || []).includes("Files");
  br.addEventListener("dragenter", (e) => { if (hasFiles(e)) { e.preventDefault(); ov.style.display = "flex"; } });
  br.addEventListener("dragover", (e) => { if (hasFiles(e)) { e.preventDefault(); ov.style.display = "flex"; } });
  br.addEventListener("dragleave", (e) => { if (!br.contains(e.relatedTarget)) ov.style.display = "none"; });
  br.addEventListener("drop", (e) => {
    ov.style.display = "none";
    if (!hasFiles(e)) return;
    e.preventDefault();
    const entries = SW.dropEntries(e);
    if (entries.length) SW.uploadEntries(entries, SW.path);
    else SW.uploadFiles(e.dataTransfer.files, SW.path);
  });
})();
</script>
